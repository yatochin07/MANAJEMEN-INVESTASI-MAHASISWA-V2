<!DOCTYPE html>
<html lang="id" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduVesting — Portofolio</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: { display: ['Plus Jakarta Sans', 'sans-serif'], body: ['Inter', 'sans-serif'] },
        colors: {
          base: { 950:'#07090f',900:'#0f1423',850:'#131928',800:'#1a2235',750:'#1e2840',700:'#253049' },
          accent: { blue:'#3b82f6', indigo:'#6366f1', violet:'#7c3aed', cyan:'#06b6d4', emerald:'#10b981', amber:'#f59e0b', rose:'#f43f5e' }
        }
      }
    }
  }
</script>

<style>
  * { box-sizing: border-box; }
  body { font-family:'Inter', sans-serif; background-color:#07090f; color:#e2e8f0; min-height:100vh; }
  .nav-active { background: linear-gradient(90deg, rgba(99,102,241,0.18) 0%, transparent 100%); border-left: 3px solid #6366f1; }
  .nav-item { border-left: 3px solid transparent; transition: background .2s ease, border-color .2s ease, color .2s ease; }
  .nav-item:hover { background: linear-gradient(90deg, rgba(99,102,241,0.1) 0%, transparent 100%); border-left-color: rgba(99,102,241,0.5); color:#a5b4fc; }
  .glass { background: rgba(19,25,40,0.85); backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.06); }
  .glass-lighter { background: rgba(30,40,64,0.6); backdrop-filter: blur(8px); border:1px solid rgba(255,255,255,0.07); }
  .mesh-bg { position:fixed; inset:0; pointer-events:none; z-index:0;
    background: radial-gradient(ellipse 60% 40% at 15% 10%, rgba(99,102,241,0.08) 0%, transparent 70%), radial-gradient(ellipse 50% 50% at 85% 80%, rgba(59,130,246,0.07) 0%, transparent 60%), radial-gradient(ellipse 40% 30% at 60% 30%, rgba(124,58,237,0.05) 0%, transparent 60%);
  }
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius:9px; }
  .portfolio-row { transition: background .15s ease; border-bottom:1px solid rgba(255,255,255,0.04); }
  .portfolio-row:hover { background: rgba(99,102,241,0.06); }
  .badge { font-size:.68rem; font-weight:600; letter-spacing:.04em; padding:2px 10px; border-radius:99px; text-transform:uppercase; }
  .metric-card { transition: transform .2s ease, box-shadow .2s ease; }
  .metric-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px -8px rgba(99,102,241,0.3); }
  .btn-primary { background: linear-gradient(135deg,#6366f1,#3b82f6); transition: opacity .2s ease, transform .15s ease, box-shadow .2s ease; }
  .btn-primary:hover { opacity:.88; transform: translateY(-1px); box-shadow: 0 6px 20px -4px rgba(99,102,241,0.5); }
  .form-input { background: rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); transition: border-color .2s ease, box-shadow .2s ease; }
  .form-input:focus { outline:none; border-color: rgba(99,102,241,0.6); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
  .logo-text { background: linear-gradient(90deg,#a5b4fc,#93c5fd); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  @keyframes fadeUp { from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  .fade-up { animation: fadeUp .5s ease both; }
  @media (max-width:767px){ aside{display:none;} .main-pad{padding-left:1rem;padding-right:1rem;} }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body class="relative">
<div class="mesh-bg" aria-hidden="true"></div>
<div class="relative z-10 flex min-h-screen">
  <aside class="fixed top-0 left-0 h-screen w-64 flex flex-col" style="background: rgba(10,14,24,0.95); border-right:1px solid rgba(255,255,255,0.05); backdrop-filter: blur(16px);">
    <div class="px-6 py-6 flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,#6366f1,#3b82f6);"><i class="fa-solid fa-chart-line text-white text-sm"></i></div>
        <span class="font-display text-lg logo-text">EduVesting</span>
    </div>
    <div class="mx-4 mb-5 p-3 rounded-xl glass-lighter flex items-center gap-3">
        <div id="sidebar-user-initial" class="w-9 h-9 rounded-full flex-shrink-0 flex items-center justify-center text-sm font-bold text-white" style="background:linear-gradient(135deg,#7c3aed,#6366f1);">U</div>
        <div class="min-w-0"><p id="sidebar-user-name" class="text-sm font-medium text-slate-200 truncate">Memuat...</p></div>
    </div>
    <nav class="flex-1 px-2 space-y-0.5 overflow-y-auto">
        <a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-r-lg text-slate-400 text-sm"><i class="fa-solid fa-gauge-high w-4 text-center"></i> Dashboard</a>
        <a href="portfolio.html" class="nav-item nav-active flex items-center gap-3 px-4 py-2.5 rounded-r-lg text-indigo-300 text-sm font-medium"><i class="fa-solid fa-briefcase w-4 text-center text-indigo-400"></i> Portofolio</a>
        <button onclick="logoutUser()" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-r-lg text-rose-400 text-sm"><i class="fa-solid fa-right-from-bracket w-4 text-center"></i> Logout</button>
    </nav>
  </aside>

  <main class="ml-64 flex-1 px-8 py-8 main-pad" style="max-width: calc(100% - 16rem);">
    <section class="mb-10 fade-up delay-4">
      <h2 class="font-display text-base text-slate-300 mb-4 flex items-center gap-2">
        <i class="fa-solid fa-table-list text-blue-400 text-sm"></i> Daftar Aset
      </h2>
      <div class="glass rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm" style="min-width:900px;">
            <thead>
              <tr style="border-bottom:1px solid rgba(255,255,255,0.06);">
                <th class="px-5 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Aset</th>
                <th class="px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Tipe</th>
                <th class="px-4 py-3.5 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Harga Beli Avg</th>
                <th class="px-4 py-3.5 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Harga Terakhir</th>
                <th class="px-4 py-3.5 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Qty</th>
                <th class="px-4 py-3.5 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Total Harga</th> <th class="px-4 py-3.5 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Floating P/L</th>
                <th class="px-5 py-3.5 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Aksi</th>
              </tr>
            </thead>
            <tbody id="asset-tbody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
</div>

<script src="js/api.js"></script>
<script>
  const supabaseClient = window.supabase.createClient('https://eirhdjllijilxjhigiwr.supabase.co', 'sb_publishable_QAJBUP9oMSsWyc3kN0wznQ_GHBxxbhD');

  async function renderAll() {
    const metrics = EduVesting.computeMetrics();
    const tbody = document.getElementById('asset-tbody');
    tbody.innerHTML = '';
    
    metrics.assets.forEach(a => {
        const def = EduVesting.ASSET_TYPES[a.type];
        const totalPrice = a.avgPrice * a.qty; // Logika Total Harga
        const pl = (a.lastPrice - a.avgPrice) * a.qty;
        const plPct = a.avgPrice > 0 ? ((a.lastPrice - a.avgPrice) / a.avgPrice) * 100 : 0;
        
        const tr = document.createElement('tr');
        tr.className = 'portfolio-row';
        tr.innerHTML = `
            <td class="px-5 py-4 font-medium text-slate-200">${a.ticker}</td>
            <td class="px-4 py-4"><span class="badge" style="background:${def.badgeBg}">${def.label}</span></td>
            <td class="px-4 py-4 text-right tabular-nums">${EduVesting.formatRupiah(a.avgPrice)}</td>
            <td class="px-4 py-4 text-right tabular-nums">${EduVesting.formatRupiah(a.lastPrice)}</td>
            <td class="px-4 py-4 text-right tabular-nums">${EduVesting.formatNumber(a.qty)}</td>
            <td class="px-4 py-4 text-right tabular-nums text-slate-300 font-semibold">${EduVesting.formatRupiah(totalPrice)}</td> <td class="px-4 py-4 text-right tabular-nums ${pl >= 0 ? 'text-emerald-400' : 'text-rose-400'}">
                ${pl >= 0 ? '+' : ''}${EduVesting.formatRupiah(pl)} (${plPct.toFixed(1)}%)
            </td>
            <td class="px-5 py-4 text-right">
                <button onclick="editAsset('${a.id}')" class="text-indigo-400 mr-2"><i class="fa-solid fa-pen"></i></button>
                <button onclick="removeAsset('${a.id}')" class="text-rose-400"><i class="fa-solid fa-trash"></i></button>
            </td>
        `;
        tbody.appendChild(tr);
    });
  }
  
  // Fungsi lain (logoutUser, onSubmit, dll) tetap sama
</script>
</body>
</html>
