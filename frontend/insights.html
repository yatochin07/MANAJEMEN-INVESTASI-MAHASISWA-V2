<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduVesting — AI Insights</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { display: ['Plus Jakarta Sans', 'sans-serif'], body: ['Inter', 'sans-serif'] } } }
    }
  </script>
  <style>
    body { background-color: #07090f; color: #e2e8f0; font-family: 'Inter', sans-serif; }
    .glass { background: rgba(19, 25, 40, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }
    .nav-active { background: linear-gradient(90deg, rgba(124,58,237,0.18) 0%, transparent 100%); border-left: 3px solid #7c3aed; }
    .ai-border::before { content: ''; position: absolute; inset: -1px; border-radius: inherit; padding: 1px; background: linear-gradient(45deg, transparent, rgba(124,58,237,0.5), rgba(6,182,212,0.5), transparent); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
  </style>
</head>

<body>
  <div class="relative z-10 flex min-h-screen">
    <aside class="w-64 bg-slate-950 border-r border-white/5">
        </aside>

    <main class="flex-1 p-8">
      <h1 class="text-2xl font-bold text-white mb-6">EduVesting AI Insights</h1>
      
      <div id="view-analytics" class="space-y-6">
        <div id="recom-container" class="space-y-4"></div>
        <div id="sector-container" class="grid grid-cols-2 gap-4"></div>
      </div>

      <div id="view-chat" class="hidden flex-1 flex flex-col">
        <div id="chat-box" class="h-[500px] overflow-y-auto p-4 glass rounded-xl space-y-4"></div>
        <form onsubmit="handleChatSubmit(event)" class="mt-4 flex gap-2">
            <input id="chat-input" class="flex-1 bg-slate-800 p-3 rounded-lg text-white" placeholder="Tanya AI...">
            <button class="bg-violet-600 px-6 rounded-lg text-white">Kirim</button>
        </form>
      </div>
    </main>
  </div>

  <script>
    let aiContextString = "";
    const supabaseClient = window.supabase.createClient('URL_SUPABASE', 'KEY_SUPABASE');

    async function renderAiDashboard(metrics) {
      // MENGAMBIL DATA DETAIL ASET
      const portfolioItems = metrics.assets.map(a => 
        `${a.ticker} (Tipe: ${a.type}, Avg: Rp${a.avgPrice.toLocaleString()}, Qty: ${a.qty})`
      ).join(' | ');

      // MENGAMBIL WATCHLIST DARI DB
      const { data: watchData } = await supabaseClient.from('watchlists').select('*');
      const watchlistItems = watchData ? watchData.map(w => w.ticker).join(', ') : "Kosong";

      // KONTEKS AI YANG DITAMBAHKAN
      aiContextString = `
        DATA PORTOFOLIO LENGKAP: ${portfolioItems}
        WATCHLIST USER: ${watchlistItems}
        TUGAS: Analisis portofolio dan watchlist user secara mendalam.
      `;
      
      // Render sisanya tetap sama...
    }
  </script>
</body>
</html>
